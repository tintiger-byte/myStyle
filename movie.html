<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>영화 리뷰 | 왕과사는 남자</title>
    <link rel="stylesheet" href="css/movie.css" />
  </head>
  <body>
    <div class="page">
      <header class="title-bar" aria-label="영화 제목">
        <h1>왕과사는 남자</h1>
      </header>

      <article class="movie-card" aria-label="영화 정보 카드">
        <img
          class="poster"
          src="https://i.namu.wiki/i/VnfGWYh7HK2t_Qt9uCQDdWw_rk1vFO9qF13dhb67hI26-ZN4tiUV-PMQOgz-UVkV0JOhtlviKCUw20uUbGp18g.webp"
          alt="영화 '왕과 사는 남자' 포스터"
        />

        <section class="section" aria-labelledby="info-title">
          <h2 id="info-title">기본정보</h2>
          <ul class="meta">
            <li><span class="badge badge--kind">장르</span> <span class="badge">생활물</span></li>
            <li><span class="badge badge--kind">장르</span> <span class="badge">사극, 드라마</span></li>
            <li><span class="badge badge--kind">개봉</span> <span class="badge">2026년</span></li>
            <li><span class="badge badge--kind">주연</span> <span class="badge">유해진, 박지훈, 유지태</span></li>
          </ul>
          <small class="source"
            >출처: <a href="https://ko.wikipedia.org/" target="_blank" rel="noopener noreferrer">위키피디아</a></small
          >
        </section>

        <hr />

        <section class="section" aria-labelledby="story-title">
          <h2 id="story-title">줄거리</h2>
          <p class="story">
            권좌에서 쫓겨난 어린 임금의 <strong>유배생활</strong> 이야기<br />
            <em>수많은 사람의 심금을 울리는 영화</em>
          </p>
        </section>

        <hr />

        <section class="section" aria-labelledby="rating-title">
          <h2 id="rating-title">나의 평점</h2>
          <p class="rating">
            <span class="stars" aria-label="별점 5점 만점에 5점">
              <span aria-hidden="true">⭐</span><span aria-hidden="true">⭐</span><span aria-hidden="true">⭐</span
              ><span aria-hidden="true">⭐</span><span aria-hidden="true">⭐</span>
            </span>
            <span class="rating-text">5 / 5점</span>
          </p>
          <p class="ticket">
            <a href="https://www.cgv.co.kr/" target="_blank" rel="noopener noreferrer">🎟 CGV예매하기</a>
          </p>
        </section>

        <hr />

        <h2 class="review-title">✏️ 한줄 리뷰 남기기</h2>

        <form class="review-form" action="#" method="post">
          <div class="field">
            <label for="name">이름</label>
            <input id="name" name="name" type="text" placeholder="이름입력" />
          </div>

          <fieldset class="field">
            <legend>별점</legend>
            <div class="radios">
              <label><input type="radio" name="score" value="1" /> 1점</label>
              <label><input type="radio" name="score" value="2" /> 2점</label>
              <label><input type="radio" name="score" value="3" /> 3점</label>
              <label><input type="radio" name="score" value="4" /> 4점</label>
              <label><input type="radio" name="score" value="5" /> 5점</label>
            </div>
          </fieldset>

          <div class="field">
            <label for="review">리뷰내용</label>
            <textarea id="review" name="review" rows="3" placeholder="한줄 리뷰를 남겨주세요"></textarea>
          </div>

          <div class="actions">
            <button type="submit">리뷰등록</button>
          </div>
        </form>
      </article>
    </div>
  </body>
</html>
